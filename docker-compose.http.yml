# HTTP mode overlay — use with:
# docker compose -f docker-compose.yml -f docker-compose.http.yml up
services:
  mnemo-mcp:
    environment:
      - TRANSPORT_MODE=http
      - CREDENTIAL_SECRET=${CREDENTIAL_SECRET}
      - MCP_RELAY_PASSWORD=${MCP_RELAY_PASSWORD}
    ports:
      - "8086:8080"
    volumes:
      - mnemo-data:/data
volumes:
  mnemo-data:
