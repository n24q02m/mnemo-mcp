name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  mention:
    if: ${{ github.event.comment != null && (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) }}
    runs-on: [self-hosted, oc-github]
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ secrets.OC_MODEL }}
          use_github_token: true
          share: "false"

  auto-issue:
    # TEMPORARY: author guard omitted so the owner can smoke-test the `issues` event.
    if: ${{ github.event_name == 'issues' }}
    runs-on: [self-hosted, oc-github]
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ secrets.OC_MODEL }}
          use_github_token: true
          share: "false"
          prompt: "A user just opened this issue. Reply once, concisely and helpfully: acknowledge them, restate the core ask in one line, and either answer it or list the exact repro details still missing (version, OS, MCP client, minimal steps, logs). Do not invent behavior you cannot verify."
